spring.application.name=crm-simples

# Configuraçőes do banco H2 (banco em memória, só pra desenvolvimento)
spring.datasource.url=jdbc:h2:mem:crmdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Faz o Spring criar as tabelas automaticamente com base nas classes
spring.jpa.hibernate.ddl-auto=update

# Ativa o console visual do H2 (para ver o banco pelo navegador)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console